<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motivation App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff512f, #dd2476);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }

    #code {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 20px 0;
    }

    #message {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* Desktop enhancement */
    @media (min-width: 768px) {
      .box {
        max-width: 500px;
        padding: 60px;
      }

      h1 {
        font-size: 2.2rem;
      }

      #code {
        font-size: 3rem;
      }

      #message {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="box">
  <h1>Your Motivation Code</h1>
  <h2 id="code">Loading...</h2>
  <p id="message"></p>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAmERxnOnCIWx9pE4lLh4_mUctwz8CiyY0",
  authDomain: "motivationapp-bb5e3.firebaseapp.com",
  projectId: "motivationapp-bb5e3",
  storageBucket: "motivationapp-bb5e3.firebasestorage.app",
  messagingSenderId: "670493392229",
  appId: "1:670493392229:web:19ce53aac11ee43389b58c",
  measurementId: "G-V3QSVJ9HW1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const messages = [
  "a",
  "b",
  "c",
  "d"
];

function makeCode() {
  return "RISE-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function getCode() {
  let code;
  let exists = true;

  while (exists) {
    code = makeCode();
    const ref = doc(db, "codes", code);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      exists = false;
      await setDoc(ref, { created: new Date() });
    }
  }

  return code;
}

async function start() {
  const code = await getCode();
  const msg = messages[Math.floor(Math.random()*messages.length)];

  document.getElementById("code").innerText = code;
  document.getElementById("message").innerText = msg;
}

start();
</script>

</body>
</html>
